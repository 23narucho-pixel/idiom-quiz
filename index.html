<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도전! 초등학교 6학년 관용표현 퀴즈</title>
  <!-- Google Fonts: Inter와 Noto Sans KR 연결 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2.0">
  
  <!-- =============================================================
   * Firebase SDK CDN 연결 (Compat 모드 사용으로 정적 JS 연동 최적화)
   * ============================================================= -->
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="container">
    <!-- 1. 메인 시작 화면 -->
    <section id="screen-start" class="screen active">
      <div class="card start-card">
        <div class="badge neon-badge">AI 스마트 챌린지</div>
        <h1 class="main-title">
          <span class="gradient-text">관용표현 퀴즈</span>
        </h1>
        <p class="subtitle">초등학교 6학년 수준의 필수 관용표현 5문제를 해결하고 학습해보세요.</p>
        
        <!-- 플로팅 프롬프트 칩 그래픽 -->
        <div class="start-graphic">
          <div class="prompt-chip chip-1">#발이_넓다 👣</div>
          <div class="prompt-chip chip-2">#귀가_얇다 👂</div>
          <div class="prompt-chip chip-3">#쇠뿔도_단김에! 🐂</div>
        </div>
        
        <!-- 로그인 상태에 따라 시작 버튼이 켜집니다 -->
        <button id="btn-start" class="btn btn-primary btn-large" disabled>로그인 후 도전하기</button>

        <!-- [레이아웃 변경] 시작하기 버튼 아래로 이동 및 프리미엄 구조로 보강된 로그인 컨테이너 -->
        <div id="auth-container" class="auth-bar-bottom">
          <div id="user-info" class="user-info-box-premium hidden">
            <div class="user-profile-header">
              <img id="user-photo" src="" alt="프로필 사진" class="profile-img-premium">
              <div class="user-profile-details">
                <span class="user-status-label">인증된 사용자</span>
                <span id="user-name" class="profile-name-premium">사용자명</span>
              </div>
            </div>
            <!-- [추가] 관리자 계정 전용 대시보드 이동 링크 버튼 (인라인 스타일 강제 숨김 처리) -->
            <a href="admin.html" id="btn-admin-link" class="btn btn-admin-premium" style="display: none;">교사용 대시보드 ➡️</a>
            <button id="btn-logout" class="btn btn-logout-premium">로그아웃</button>
          </div>
          <div id="login-box" class="login-box-container">
            <button id="btn-login-google" class="btn btn-google-premium">
              <span class="g-icon">⚙️</span> Google 계정으로 로그인
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- 2. 퀴즈 풀이 화면 -->
    <section id="screen-quiz" class="screen">
      <div class="quiz-header">
        <div class="progress-container">
          <div class="progress-info">
            <span class="progress-label">진행 상황</span>
            <span id="quiz-progress-text" class="gradient-text">1 / 5</span>
          </div>
          <div class="progress-bar-bg">
            <div id="quiz-progress-fill" class="progress-bar-fill"></div>
          </div>
        </div>
      </div>
      
      <div class="card quiz-card">
        <div class="quiz-question-box">
          <span class="question-number-badge" id="question-number">Q1.</span>
          <h2 id="quiz-question" class="question-text">질문 텍스트가 들어갈 자리입니다.</h2>
        </div>
        <div id="quiz-options" class="options-grid">
          <!-- 자바스크립트로 4지선다 버튼을 생성합니다 -->
        </div>
      </div>
    </section>

    <!-- 3. 결과 화면 -->
    <section id="screen-result" class="screen">
      <div class="card result-card">
        <div class="badge success-badge neon-badge-success">분석 완료</div>
        <h1 class="result-title">나의 종합 점수</h1>
        
        <div class="score-container">
          <div class="score-circle">
            <span id="result-score" class="score-value">0</span>
            <span class="score-max">/ 100</span>
          </div>
        </div>
        
        <p id="result-message" class="result-message">데이터 계산 중...</p>
        
        <!-- 오답 노트 섹션 -->
        <div class="review-section">
          <h3 class="review-title">📝 오답 분석 보고서</h3>
          <div id="review-list" class="review-list">
            <!-- 자바스크립트로 푼 문항 정보(정오답 해설)가 렌더링됩니다 -->
          </div>
        </div>

        <!-- 파이어베이스 데이터베이스 기반 나의 과거 도전 이력 섹션 -->
        <div class="history-section">
          <h3 class="history-title">📊 나의 과거 도전 기록 (최근 5회)</h3>
          <div class="table-container">
            <table class="history-table">
              <thead>
                <tr>
                  <th>도전 날짜</th>
                  <th>맞힌 문제</th>
                  <th>최종 점수</th>
                </tr>
              </thead>
              <tbody id="history-list">
                <!-- 파이어베이스 Firestore에서 가져온 데이터가 동적 추가됩니다 -->
                <tr>
                  <td colspan="3" class="table-empty">로딩 중이거나 기록이 없습니다.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        
        <!-- 퀴즈 결과 하단 동작 버튼 그룹 -->
        <div class="button-group">
          <button id="btn-restart" class="btn btn-primary btn-large">다시 도전하기</button>
          <!-- [신규 추가] 시작 홈 화면 복귀 버튼 -->
          <button id="btn-go-home" class="btn btn-secondary btn-large" style="margin-top: 12px; background-color: var(--card-inner) !important; color: var(--text-primary) !important; border: 1px solid var(--border-color) !important;">홈으로</button>
        </div>
      </div>
    </section>
  </div>

  <script defer src="app.js?v=2.0"></script>
</body>
</html>
